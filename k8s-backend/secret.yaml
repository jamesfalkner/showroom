apiVersion: v1
kind: Secret
metadata:
  name: workshop-backend-secrets
  labels:
    app.kubernetes.io/name: workshop-backend
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Base64 encoded API key - replace with your actual API key
  # To encode: echo -n "your-api-key-here" | base64
  llm-api-key: ""  # Add your base64 encoded API key here
stringData:
  # You can also use stringData for plain text (will be base64 encoded automatically)
  # llm-api-key: "your-api-key-here"
