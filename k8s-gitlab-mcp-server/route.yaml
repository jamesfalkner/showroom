apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitlab-mcp-server
  namespace: showroom-mcp
  labels:
    app.kubernetes.io/name: gitlab-mcp-server
    app.kubernetes.io/component: mcp-server
spec:
  to:
    kind: Service
    name: gitlab-mcp-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None