apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-mcp-server
  namespace: showroom-mcp
  labels:
    app.kubernetes.io/name: gitlab-mcp-server
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitlab-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-mcp-server
        app.kubernetes.io/component: mcp-server
    spec:
      containers:
      - name: gitlab-mcp-server
        image: image-registry.openshift-image-registry.svc:5000/NAMESPACE_PLACEHOLDER/gitlab-mcp-server:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: STREAMABLE_HTTP
          value: "true"
        - name: GITLAB_API_URL
          valueFrom:
            secretKeyRef:
              name: gitlab-mcp-secrets
              key: gitlab-api-url
        - name: GITLAB_PERSONAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitlab-mcp-secrets
              key: gitlab-personal-access-token
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      restartPolicy: Always