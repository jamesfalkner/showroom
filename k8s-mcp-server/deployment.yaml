apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  labels:
    app.kubernetes.io/name: workshop-mcp
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/version: "v0.0.49"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workshop-mcp
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workshop-mcp
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/version: "v0.0.49"
    spec:
      serviceAccountName: mcp-server
      securityContext:
        runAsNonRoot: true
      containers:
      - name: mcp-server
        # Using the image built in OpenShift's internal registry
        image: image-registry.openshift-image-registry.svc:5000/NAMESPACE_PLACEHOLDER/mcp-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: MCP_SERVER_HOST
          value: "0.0.0.0"
        - name: MCP_SERVER_PORT
          value: "8080"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # CORS environment variables (if supported by the MCP server)
        - name: CORS_ALLOW_ORIGIN
          value: "*"
        - name: CORS_ALLOW_METHODS
          value: "GET,POST,PUT,DELETE,OPTIONS"
        - name: CORS_ALLOW_HEADERS
          value: "Content-Type,Authorization,X-Requested-With"
        volumeMounts:
        - name: config
          mountPath: /etc/mcp-config
          readOnly: true
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: mcp-server-config
          items:
          - key: server-config.toml
            path: server-config.toml
      restartPolicy: Always
