apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  labels:
    app.kubernetes.io/name: workshop-mcp
    app.kubernetes.io/component: config
data:
  # MCP Server Configuration in TOML format
  server-config.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080
    
    [server.cors]
    enabled = true
    origins = ["*"]
    methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    headers = ["Content-Type", "Authorization"]
    
    [kubernetes]
    inCluster = true
    namespace = "default"
    
    [auth]
    enabled = false
    
    [logging]
    level = "info"
    format = "json"
