apiVersion: v1
kind: Secret
metadata:
  name: mcp-server-auth
  labels:
    app.kubernetes.io/name: workshop-mcp
    app.kubernetes.io/component: auth
type: Opaque
data:
  # Base64 encoded API key for chatbot authentication
  # Generate with: echo -n "your-secure-api-key-here" | base64
  api-key: ""
  # Base64 encoded bearer token (optional, for additional security)
  # Generate with: echo -n "Bearer $(openssl rand -hex 32)" | base64
  bearer-token: ""
stringData:
  # You can also use stringData for plain text (will be auto-encoded)
  # api-key: "your-secure-api-key-here"
  # bearer-token: "Bearer your-bearer-token-here"
